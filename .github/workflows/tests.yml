name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install Godot .NET 4.6
        run: |
          wget -q -O godot.zip https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_mono_linux_x86_64.zip
          unzip -q godot.zip -d godot-bin
          GODOT_BIN=$(find godot-bin -type f \( -name 'Godot*' -o -name 'godot*' \) | head -n 1)
          chmod +x "$GODOT_BIN"
          sudo ln -sf "$PWD/$GODOT_BIN" /usr/local/bin/godot
          godot --version

      - name: Restore dependencies
        run: dotnet restore tests/Societies.Core.Tests/Societies.Core.Tests.csproj

      - name: Build authoritative Godot project
        run: dotnet build src/societies/Societies.csproj --configuration Release --no-restore

      - name: Run unit tests with coverage
        run: >
          dotnet test tests/Societies.Core.Tests/Societies.Core.Tests.csproj
          --configuration Release
          --logger "trx;LogFileName=unit-tests.trx"
          --collect:"XPlat Code Coverage"

      - name: Build Godot C# solutions
        run: godot --headless --path src/societies --build-solutions --quit

      - name: Run headless smoke suite
        run: godot --headless --path src/societies res://tests/HeadlessTestRunner.tscn

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success() || failure()
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false
          verbose: true
