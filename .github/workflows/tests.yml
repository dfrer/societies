name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['6.0']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: societies_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup Godot (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O godot.zip https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_linux_x86_64.zip
          unzip -q godot.zip
          sudo mv Godot_v4.2.2-stable_mono_linux_x86_64/godot.* /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Setup Godot (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_win64.exe.zip" -OutFile "godot.zip"
          Expand-Archive -Path "godot.zip" -DestinationPath "$env:LOCALAPPDATA\Godot"
          Add-Content $env:GITHUB_PATH "$env:LOCALAPPDATA\Godot"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/societies/Societies.csproj

      - name: Build project
        run: dotnet build src/societies/Societies.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        env:
          POSTGRES_CONNECTION_STRING: "Host=localhost;Port=5432;Database=societies_test;Username=test_user;Password=test_password"
          SQLITE_CONNECTION_STRING: "Data Source=:memory:"
        run: |
          dotnet test tests/Societies.Core.Tests --configuration Release --no-build --verbosity normal

      - name: Run Integration Tests
        env:
          POSTGRES_CONNECTION_STRING: "Host=localhost;Port=5432;Database=societies_test;Username=test_user;Password=test_password"
          SQLITE_CONNECTION_STRING: "Data Source=:memory:"
        run: |
          dotnet test tests/Societies.Integration.Tests --configuration Release --no-build --verbosity normal

      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results (${{ matrix.os }})
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: runner.os == 'Linux'
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false
          verbose: true

  build-godot:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Godot (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O godot.zip https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_linux_x86_64.zip
          unzip -q godot.zip
          sudo mv Godot_v4.2.2-stable_mono_linux_x86_64/godot.* /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Setup Godot (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_win64.exe.zip" -OutFile "godot.zip"
          Expand-Archive -Path "godot.zip" -DestinationPath "$env:LOCALAPPDATA\Godot"
          Add-Content $env:GITHUB_PATH "$env:LOCALAPPDATA\Godot"

      - name: Build Godot Project
        run: |
          cd src/societies
          godot --headless --build-solutions --quit

      - name: Export Godot Project (Debug)
        run: |
          cd src/societies
          godot --headless --export-debug "Linux/X11" /tmp/societies_debug || true
        if: runner.os == 'Linux'

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0'

      - name: Restore tools
        run: dotnet tool restore

      - name: Run dotnet format
        run: |
          dotnet format src/societies/Societies.csproj --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      - name: Run dotnet format (fix)
        if: github.event_name == 'pull_request'
        run: |
          dotnet format src/societies/Societies.csproj --verbosity diagnostic

      - name: Comment PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Code formatting check failed. Please run `dotnet format` locally and push the changes.'
            })
